<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FitLure - Health Blog</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 50px; text-align: center; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .articles { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); cursor: pointer; }
        .card:hover { transform: translateY(-3px); }
        .category { background: #00c853; color: white; padding: 3px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        h3 { margin: 10px 0; }
        .date { color: #888; font-size: 12px; margin-top: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { background: white; max-width: 800px; margin: 50px auto; padding: 30px; border-radius: 20px; max-height: 80%; overflow: auto; }
        .close { float: right; font-size: 28px; cursor: pointer; }
        footer { text-align: center; padding: 30px; background: #1a1a2e; color: white; margin-top: 40px; }
        .search { text-align: center; margin: 30px 0; }
        .search input { padding: 12px; width: 300px; border-radius: 25px; border: 1px solid #ddd; }
        .search button { padding: 12px 25px; background: #00c853; color: white; border: none; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>🌿 FitLure</h1>
    <p>Better Habits. Better Health.</p>
</div>

<div class="search">
    <input type="text" id="searchInput" placeholder="Search articles...">
    <button onclick="searchArticles()">🔍 Search</button>
</div>

<div class="container">
    <div class="articles" id="articlesContainer">
        <div style="text-align: center;">Loading articles from GitHub Issues...</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<footer>
    <p>&copy; 2025 FitLure | All rights reserved</p>
</footer>

<script>
// 🔥 YAHAN APNA GITHUB USERNAME AUR REPO NAME DALO 🔥
const GITHUB_USERNAME = "YOUR_USERNAME";
const GITHUB_REPO = "fitlure-blog";

let allArticles = [];

async function loadArticles() {
    try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/issues?state=open&labels=article`);
        const issues = await response.json();
        
        allArticles = issues.map(issue => ({
            id: issue.number,
            title: issue.title,
            content: issue.body,
            date: new Date(issue.created_at).toLocaleDateString(),
            url: issue.html_url
        }));
        
        displayArticles(allArticles);
    } catch(error) {
        console.error("Error:", error);
        document.getElementById('articlesContainer').innerHTML = `
            <div style="text-align: center; padding: 50px;">
                <h2>⚠️ Setup Required</h2>
                <p>1. Go to GitHub and create a repository named: <strong>fitlure-blog</strong></p>
                <p>2. In this code, change <strong>YOUR_USERNAME</strong> to your GitHub username</p>
                <p>3. Go to <strong>Issues</strong> tab and create a new issue with label "article"</p>
                <p>4. Wait 1 minute and refresh</p>
            </div>
        `;
    }
}

function displayArticles(articles) {
    const container = document.getElementById('articlesContainer');
    
    if(articles.length === 0) {
        container.innerHTML = '<div style="text-align: center;">No articles yet. Create an Issue in GitHub!</div>';
        return;
    }
    
    container.innerHTML = articles.map(article => `
        <div class="card" onclick="showArticle(${article.id})">
            <div style="padding: 15px;">
                <span class="category">📝 Article</span>
                <h3>${article.title}</h3>
                <p class="date">📅 ${article.date}</p>
                <p>${article.content?.substring(0, 150) || ''}...</p>
            </div>
        </div>
    `).join('');
}

function showArticle(id) {
    const article = allArticles.find(a => a.id === id);
    if(article) {
        document.getElementById('modalBody').innerHTML = `
            <h2>${article.title}</h2>
            <p class="date">📅 ${article.date}</p>
            <hr>
            <div style="line-height: 1.8;">${article.content?.replace(/\n/g, '<br>') || ''}</div>
        `;
        document.getElementById('modal').style.display = 'block';
    }
}

function searchArticles() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allArticles.filter(a => 
        a.title.toLowerCase().includes(keyword) || 
        (a.content && a.content.toLowerCase().includes(keyword))
    );
    displayArticles(filtered);
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

loadArticles();
</script>

</body>
</html>
