<div class="mt-12 pt-8 border-t border-gray-100">
    <h3 class="text-lg font-bold mb-4 text-gray-700">Security Settings</h3>
    <div class="flex gap-4">
        <input type="password" id="newPass" placeholder="Enter New Password" class="flex-1 p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
        <button onclick="updatePassword()" class="bg-gray-800 text-white px-8 py-4 rounded-2xl font-bold hover:bg-black transition">Update Password</button>
    </div>
</div>

<script>
// --- PASSWORD LOGIC ---

async function showLogin() {
    const passInput = prompt("Admin Password Required:");
    if(!passInput) return;

    // Database se password check karna
    const { data, error } = await supabase
        .from('admin_settings')
        .select('password')
        .eq('id', 1)
        .single();

    if (data && passInput === data.password) {
        document.getElementById('adminSection').classList.remove('hidden');
        document.getElementById('adminBtn').classList.add('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        renderProducts();
    } else {
        alert("Invalid Password!");
    }
}

async function updatePassword() {
    const newPass = document.getElementById('newPass').value;
    if(!newPass) return alert("Please enter a new password");

    const { error } = await supabase
        .from('admin_settings')
        .update({ password: newPass })
        .eq('id', 1);

    if(!error) {
        alert("Password updated successfully! Please login again.");
        location.reload();
    } else {
        alert("Error updating password: " + error.message);
    }
}
</script>
