<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Shop Homepage - Search & Load More</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            .card-img-top {
                height: 300px; 
                object-fit: cover; 
            }
            /* Shuru mein items ko control karne ke liye */
            .product-item {
                display: none;
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="#!">Start Bootstrap</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"></button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                        <li class="nav-item"><a class="nav-link active" href="#!">Home</a></li>
                    </ul>
                    <div class="d-flex">
                        <input class="form-control me-2" type="search" id="searchInput" placeholder="Search products..." aria-label="Search">
                        <button class="btn btn-outline-dark" id="searchBtn" type="button">Search</button>
                    </div>
                </div>
            </div>
        </nav>
        
        <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">
                    <h1 class="display-4 fw-bolder">Shop in style</h1>
                    <p class="lead fw-normal text-white-50 mb-0">Search and explore our products</p>
                </div>
            </div>
        </header>

        <section class="py-5">
            <div class="container px-4 px-lg-5 mt-5">
                <div id="product-container" class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center">
                    
                    <div class="col mb-5 product-item">
                        <div class="card h-100">
                            <img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." />
                            <div class="card-body p-4"><div class="text-center"><h5 class="fw-bolder">Fancy Product</h5></div></div>
                            <div class="card-footer p-4 pt-0 border-top-0 bg-transparent"><div class="text-center"><a class="btn btn-outline-dark mt-auto" href="#">Open Link</a></div></div>
                        </div>
                    </div>
                    <div class="col mb-5 product-item">
                        <div class="card h-100">
                            <img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." />
                            <div class="card-body p-4"><div class="text-center"><h5 class="fw-bolder">Special Item</h5></div></div>
                            <div class="card-footer p-4 pt-0 border-top-0 bg-transparent"><div class="text-center"><a class="btn btn-outline-dark mt-auto" href="#">Open Link</a></div></div>
                        </div>
                    </div>
                    </div>

                <div class="text-center mt-4">
                    <button id="loadMore" class="btn btn-dark btn-lg">More Products</button>
                </div>
            </div>
        </section>

        <footer class="py-5 bg-dark">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; Your Website 2023</p></div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        
        <script>
            let currentItems = 8;
            const items = [...document.querySelectorAll('.product-item')];
            const loadMoreBtn = document.querySelector('#loadMore');
            const searchInput = document.querySelector('#searchInput');
            const searchBtn = document.querySelector('#searchBtn');

            // Shuruat mein 8 items dikhane ka function
            function displayItems(count) {
                items.forEach((item, index) => {
                    if (index < count) {
                        item.style.display = 'block';
                    } else {
                        item.style.display = 'none';
                    }
                });
                
                if (count >= items.length) {
                    loadMoreBtn.style.display = 'none';
                } else {
                    loadMoreBtn.style.display = 'inline-block';
                }
            }

            // Load More click event
            loadMoreBtn.addEventListener('click', () => {
                currentItems += 8;
                displayItems(currentItems);
            });

            // Search Logic
            function filterProducts() {
                const keyword = searchInput.value.toLowerCase();
                
                if (keyword === "") {
                    // Agar search box khali hai to wapis normal 8 dikhao
                    currentItems = 8;
                    displayItems(currentItems);
                } else {
                    // Agar kuch search ho raha hai to 'More' button hide kar do aur sab search result dikhao
                    loadMoreBtn.style.display = 'none';
                    items.forEach(item => {
                        const title = item.querySelector('h5').innerText.toLowerCase();
                        if (title.includes(keyword)) {
                            item.style.display = 'block';
                        } else {
                            item.style.display = 'none';
                        }
                    });
                }
            }

            // Search button click aur typing dono pe kaam karega
            searchBtn.addEventListener('click', filterProducts);
            searchInput.addEventListener('keyup', filterProducts);

            // Page load pe pehle 8 dikhao
            displayItems(currentItems);
        </script>
    </body>
</html>
