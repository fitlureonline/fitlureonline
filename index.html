<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Shop Homepage - Responsive Grid</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            .card-img-top {
                height: 200px; /* Mobile ke liye */
                object-fit: cover; 
            }
            @media (min-width: 768px) {
                .card-img-top { height: 300px; }
            }
            
            .product-item {
                display: none; /* Default hidden */
            }

            /* Mobile view par 2 products per row (Total 4 show honge shuru me) */
            @media (max-width: 767px) {
                .row-cols-2 > * {
                    flex: 0 0 auto;
                    width: 50%;
                }
                .container {
                    padding-left: 10px;
                    padding-right: 10px;
                }
                /* Mobile search bar spacing */
                .navbar .d-flex {
                    margin-top: 15px;
                }
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="#!">Start Bootstrap</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                        <li class="nav-item"><a class="nav-link active" href="#!">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="#!">About</a></li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown">Shop</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#!">All Products</a></li>
                            </ul>
                        </li>
                    </ul>
                    <div class="d-flex">
                        <input class="form-control me-2" type="search" id="searchInput" placeholder="Search products..." aria-label="Search">
                        <button class="btn btn-outline-dark" id="searchBtn" type="button">Search</button>
                    </div>
                </div>
            </div>
        </nav>
        
        <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">
                    <h1 class="display-4 fw-bolder">Shop in style</h1>
                    <p class="lead fw-normal text-white-50 mb-0">Search items below</p>
                </div>
            </div>
        </header>

        <section class="py-5">
            <div class="container px-2 px-lg-5 mt-5">
                <div id="product-container" class="row gx-3 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center">
                    
                    <div class="col mb-5 product-item"><div class="card h-100"><img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." /><div class="card-body p-4 text-center"><h5 class="fw-bolder">Product 1</h5></div><div class="card-footer p-4 pt-0 border-top-0 bg-transparent text-center"><a class="btn btn-outline-dark mt-auto" href="#">Link</a></div></div></div>
                    <div class="col mb-5 product-item"><div class="card h-100"><img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." /><div class="card-body p-4 text-center"><h5 class="fw-bolder">Product 2</h5></div><div class="card-footer p-4 pt-0 border-top-0 bg-transparent text-center"><a class="btn btn-outline-dark mt-auto" href="#">Link</a></div></div></div>
                    <div class="col mb-5 product-item"><div class="card h-100"><img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." /><div class="card-body p-4 text-center"><h5 class="fw-bolder">Product 3</h5></div><div class="card-footer p-4 pt-0 border-top-0 bg-transparent text-center"><a class="btn btn-outline-dark mt-auto" href="#">Link</a></div></div></div>
                    <div class="col mb-5 product-item"><div class="card h-100"><img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." /><div class="card-body p-4 text-center"><h5 class="fw-bolder">Product 4</h5></div><div class="card-footer p-4 pt-0 border-top-0 bg-transparent text-center"><a class="btn btn-outline-dark mt-auto" href="#">Link</a></div></div></div>
                    <div class="col mb-5 product-item"><div class="card h-100"><img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." /><div class="card-body p-4 text-center"><h5 class="fw-bolder">Laptop</h5></div><div class="card-footer p-4 pt-0 border-top-0 bg-transparent text-center"><a class="btn btn-outline-dark mt-auto" href="#">Link</a></div></div></div>
                    <div class="col mb-5 product-item"><div class="card h-100"><img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." /><div class="card-body p-4 text-center"><h5 class="fw-bolder">Mobile Phone</h5></div><div class="card-footer p-4 pt-0 border-top-0 bg-transparent text-center"><a class="btn btn-outline-dark mt-auto" href="#">Link</a></div></div></div>
                    <div class="col mb-5 product-item"><div class="card h-100"><img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." /><div class="card-body p-4 text-center"><h5 class="fw-bolder">Product 7</h5></div><div class="card-footer p-4 pt-0 border-top-0 bg-transparent text-center"><a class="btn btn-outline-dark mt-auto" href="#">Link</a></div></div></div>
                    <div class="col mb-5 product-item"><div class="card h-100"><img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." /><div class="card-body p-4 text-center"><h5 class="fw-bolder">Product 8</h5></div><div class="card-footer p-4 pt-0 border-top-0 bg-transparent text-center"><a class="btn btn-outline-dark mt-auto" href="#">Link</a></div></div></div>
                    <div class="col mb-5 product-item"><div class="card h-100"><img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." /><div class="card-body p-4 text-center"><h5 class="fw-bolder">Extra Item</h5></div><div class="card-footer p-4 pt-0 border-top-0 bg-transparent text-center"><a class="btn btn-outline-dark mt-auto" href="#">Link</a></div></div></div>

                </div>

                <div class="text-center mt-4">
                    <button id="loadMore" class="btn btn-dark btn-lg">More Products</button>
                </div>
            </div>
        </section>

        <footer class="py-5 bg-dark"><div class="container"><p class="m-0 text-center text-white">Copyright &copy; Your Website 2023</p></div></footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        
        <script>
            const isMobile = window.innerWidth < 768;
            let initialLimit = isMobile ? 4 : 8; 
            let currentItems = initialLimit;
            const itemsPerClick = 8;
            
            const items = [...document.querySelectorAll('.product-item')];
            const loadMoreBtn = document.querySelector('#loadMore');
            const searchInput = document.querySelector('#searchInput');
            const searchBtn = document.querySelector('#searchBtn');

            function displayItems(count) {
                items.forEach((item, index) => {
                    item.style.display = (index < count) ? 'block' : 'none';
                });

                if (count >= items.length) {
                    loadMoreBtn.innerText = "Show Less";
                } else {
                    loadMoreBtn.innerText = "More Products";
                }
            }

            loadMoreBtn.addEventListener('click', () => {
                if (loadMoreBtn.innerText === "Show Less") {
                    currentItems = initialLimit;
                } else {
                    currentItems += itemsPerClick;
                }
                displayItems(currentItems);
            });

            // SEARCH LOGIC
            function filterProducts() {
                const keyword = searchInput.value.toLowerCase();
                if (keyword === "") {
                    loadMoreBtn.style.display = 'inline-block';
                    displayItems(currentItems);
                } else {
                    // Search ke waqt button hide ho jayega aur matching results show honge
                    loadMoreBtn.style.display = 'none';
                    items.forEach(item => {
                        const title = item.querySelector('h5').innerText.toLowerCase();
                        item.style.display = title.includes(keyword) ? 'block' : 'none';
                    });
                }
            }

            searchBtn.addEventListener('click', filterProducts);
            searchInput.addEventListener('keyup', filterProducts);

            // Initial load
            displayItems(currentItems);
        </script>
    </body>
</html>
