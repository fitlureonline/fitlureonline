<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USA Viral Picks | Premium Deals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; margin: 0; }
        .product-card { transition: transform 0.3s ease; background: #fff; padding: 15px; border-radius: 20px; text-align: center; border: 1px solid #f1f1f1; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-purple { background: #6c5ce7; color: white; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 13px; text-transform: uppercase; width: 100%; display: block; text-decoration: none; border: none; cursor: pointer; }
        
        /* 100% WORKING LOGIN BUTTON STYLE */
        #adminBtn {
            position: fixed; /* Taake koi layer isay block na kare */
            top: 20px;
            right: 20px;
            z-index: 999999;
            background-color: #6366f1;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 12px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        #adminBtn:hover { background-color: #4f46e5; }
        
        nav { background: white; border-bottom: 1px solid #eee; padding: 20px 0; }
        .hidden { display: none !important; }
        footer { padding: 50px 0; text-align: center; border-top: 1px solid #eee; margin-top: 50px; color: #94a3b8; font-size: 13px; }
    </style>
</head>
<body>

<button type="button" id="adminBtn" onclick="handleAdminLogin()">Admin Login</button>

<nav class="px-10">
    <div class="max-w-7xl mx-auto flex items-center">
        <h1 class="text-2xl font-extrabold tracking-tighter"><span class="text-indigo-600">VIRAL</span><span class="text-gray-900">DEALS</span></h1>
    </div>
</nav>

<div id="adminSection" class="hidden max-w-4xl mx-auto my-10 p-8 bg-gray-50 rounded-3xl border border-indigo-100 shadow-xl">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-gray-800">Admin Panel</h2>
        <button onclick="location.reload()" class="text-red-500 font-bold text-sm">Logout</button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" id="pTitle" placeholder="Product Title" class="p-3 rounded-xl border">
        <input type="text" id="pLink" placeholder="Affiliate Link" class="p-3 rounded-xl border">
        <input type="file" id="pImageFile" class="p-2">
    </div>
    <button onclick="uploadProduct()" id="saveBtn" class="w-full bg-black text-white mt-4 py-4 rounded-xl font-bold">Add Product</button>
</div>

<header class="py-20 text-center">
    <h1 class="text-5xl md:text-6xl font-black text-gray-900 mb-2 uppercase tracking-tighter">USA <span class="text-indigo-600">Viral</span> Picks</h1>
    <p class="text-gray-400 text-lg">Hand-picked trending products from across the USA.</p>
</header>

<main class="max-w-7xl mx-auto px-6">
    <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-8">
        </div>
</main>

<footer>
    <p>© 2026 ViralDeals USA. All rights reserved.</p>
</footer>

<script>
    const SB_URL = "https://wozlhgnrdtjrpcswfnng.supabase.co";
    const SB_KEY = "sb_publishable_0l_1z3TYg-CTTnLskiMTzg_ljcPuoaq";
    const supabase = lib.supabase.createClient(SB_URL, SB_KEY);

    // 1. DUMMY PRODUCTS (Instant Load)
    const dummyProducts = Array.from({ length: 10 }, (_, i) => ({
        id: `dummy-${i}`,
        title: `Viral Trending Product #${i + 1}`,
        image_url: `https://picsum.photos/400/500?random=${i}`,
        btn_text: "Check Price",
        affiliate_link: "#"
    }));

    // Start by showing dummy products immediately
    window.onload = () => {
        renderUI(dummyProducts);
        fetchLiveProducts();
    };

    // 2. FIXED LOGIN FUNCTION
    async function handleAdminLogin() {
        console.log("Login Clicked");
        const pass = prompt("Enter Admin Password:");
        if(!pass) return;

        const { data, error } = await supabase.from('admin_settings').select('password').eq('id', 1).single();
        
        if (data && pass === data.password) {
            document.getElementById('adminSection').classList.remove('hidden');
            document.getElementById('adminBtn').classList.add('hidden');
            window.scrollTo({ top: 100, behavior: 'smooth' });
        } else {
            alert("Wrong password!");
        }
    }

    // 3. FETCH LIVE DATA
    async function fetchLiveProducts() {
        const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });
        if (data && data.length > 0) {
            renderUI(data); // Replace dummy with live data
        }
    }

    function renderUI(products) {
        const grid = document.getElementById('productGrid');
        const isAdmin = !document.getElementById('adminSection').classList.contains('hidden');
        grid.innerHTML = '';

        products.forEach(p => {
            grid.innerHTML += `
                <div class="product-card flex flex-col relative">
                    ${isAdmin && !p.id.toString().includes('dummy') ? `<button onclick="deleteProd(${p.id})" class="absolute top-2 right-2 bg-red-500 text-white w-6 h-6 rounded-full text-[10px]">X</button>` : ''}
                    <img src="${p.image_url}" class="w-full h-60 object-cover rounded-2xl mb-4" alt="Product">
                    <h3 class="font-bold text-gray-800 text-sm h-10 line-clamp-2 mb-4 px-1 leading-tight">${p.title}</h3>
                    <a href="${p.affiliate_link}" target="_blank" class="btn-purple mt-auto">${p.btn_text || 'Shop Now'}</a>
                </div>
            `;
        });
    }

    // 4. UPLOAD FUNCTION
    async function uploadProduct() {
        const file = document.getElementById('pImageFile').files[0];
        const title = document.getElementById('pTitle').value;
        const link = document.getElementById('pLink').value;
        if(!file || !title || !link) return alert("All fields required!");

        const btn = document.getElementById('saveBtn');
        btn.innerText = "Uploading..."; btn.disabled = true;

        const fileName = `img_${Date.now()}`;
        await supabase.storage.from('product-images').upload(fileName, file);
        const { data: pub } = supabase.storage.from('product-images').getPublicUrl(fileName);
        
        await supabase.from('products').insert([{ title, image_url: pub.publicUrl, affiliate_link: link }]);
        location.reload();
    }

    async function deleteProd(id) {
        if(confirm("Delete this product?")) {
            await supabase.from('products').delete().eq('id', id);
            location.reload();
        }
    }
</script>

</body>
</html>
