<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitle">Premium Deals | USA Viral Picks</title>
    <link id="favicon" rel="icon" href="https://via.placeholder.com/32" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: white; margin: 0; display: flex; flex-direction: column; min-height: screen; }
        .product-card { transition: all 0.3s ease; background: white; padding: 1rem; border-radius: 1.5rem; text-align: center; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-gradient { background: #6c5ce7; color: white; border: none; cursor: pointer; text-decoration: none; display: inline-block; width: 100%; text-align: center; padding: 1rem; border-radius: 1rem; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .hidden { display: none !important; }
        nav { background: white; border-bottom: 1px solid #eee; padding: 1.5rem 0; position: sticky; top: 0; z-index: 1000; }
        footer { margin-top: auto; padding: 60px 0; background: white; border-top: 1px solid #eee; text-align: center; font-size: 0.8rem; color: #94a3b8; }
        .admin-dot { color: #f8fafc; cursor: pointer; user-select: none; font-size: 10px; position: absolute; bottom: 5px; right: 5px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

<nav class="px-6 md:px-12">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <a href="index.html" class="no-underline">
            <h1 id="textLogo" class="text-2xl font-extrabold tracking-tighter m-0"><span class="text-indigo-600">VIRAL</span><span class="text-gray-900">DEALS</span></h1>
            <img id="imgLogo" src="" class="h-10 hidden" alt="Logo">
        </a>
        <button type="button" onclick="handleLoginRequest()" id="adminBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-full text-xs font-bold shadow hover:bg-indigo-700 transition cursor-pointer relative z-[2000]">
            Admin Login
        </button>
    </div>
</nav>

<div id="adminSection" class="hidden max-w-5xl mx-auto my-10 p-10 bg-white rounded-[2rem] shadow-2xl border border-indigo-100 z-[1500] relative">
    <div class="flex justify-between items-center mb-8 border-b pb-6">
        <h2 class="text-2xl font-bold">Admin Panel</h2>
        <button onclick="location.reload()" class="bg-gray-100 px-4 py-2 rounded-xl text-sm font-bold">Logout</button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <input type="text" id="pTitle" placeholder="Product Title" class="p-3 border rounded-xl">
        <input type="text" id="pBtn" placeholder="Button Text" class="p-3 border rounded-xl">
        <input type="text" id="pLink" placeholder="Affiliate Link" class="p-3 border rounded-xl">
        <input type="file" id="pImageFile" accept="image/*" class="p-3 border rounded-xl">
    </div>
    <button id="saveBtn" onclick="handleUpload()" class="w-full btn-gradient py-4 rounded-2xl font-bold text-lg">Upload Now</button>
</div>

<header class="py-20 text-center">
    <h1 class="text-6xl font-black text-gray-900 mb-2 uppercase tracking-tighter">USA <span class="text-indigo-600">Viral</span> Picks</h1>
    <p class="text-gray-400 text-xl font-medium">Hand-picked trending products for you.</p>
</header>

<main class="flex-grow max-w-7xl mx-auto px-6 w-full">
    <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-12 pb-24">
        </div>
    <div id="pagination" class="flex justify-center my-10 gap-3"></div>
</main>

<footer>
    <p>© 2026 ViralDeals USA. All rights reserved.</p>
    <div class="mt-6 flex justify-center gap-6 text-xs text-indigo-500 font-black uppercase tracking-widest">
        <a href="#">Privacy</a> <a href="#">Terms</a> <a href="#">DMCA</a>
    </div>
    <span onclick="handleLoginRequest()" class="admin-dot">.</span>
</footer>

<script>
    const SB_URL = "https://wozlhgnrdtjrpcswfnng.supabase.co";
    const SB_KEY = "sb_publishable_0l_1z3TYg-CTTnLskiMTzg_ljcPuoaq";
    const supabase = lib.supabase.createClient(SB_URL, SB_KEY);

    // 10 DUMMY PRODUCTS
    const dummyData = Array.from({ length: 10 }, (_, i) => ({
        id: `dummy-${i}`,
        title: `Premium Viral Find #${i+1} - Trending in USA`,
        image_url: `https://picsum.photos/400/500?random=${i+10}`,
        btn_text: "Check Price",
        affiliate_link: "#"
    }));

    let liveProducts = [];
    let currentPage = 1;
    const itemsPerPage = 20;

    window.onload = () => { 
        renderGrid(dummyData); // Step 1: Show Dummy immediately
        fetchLiveProducts();   // Step 2: Fetch Live data
    };

    async function handleLoginRequest() {
        const pass = prompt("Enter Admin Password:");
        if(!pass) return;
        const { data } = await supabase.from('admin_settings').select('password').eq('id', 1).single();
        if(data && pass === data.password) {
            document.getElementById('adminSection').classList.remove('hidden');
            document.getElementById('adminBtn').classList.add('hidden');
            window.scrollTo({ top: 100, behavior: 'smooth' });
            renderGrid(liveProducts.length > 0 ? liveProducts : dummyData);
        } else { alert("Incorrect Password!"); }
    }

    async function fetchLiveProducts() {
        const { data } = await supabase.from('products').select('*').order('created_at', { ascending: false });
        if(data && data.length > 0) {
            liveProducts = data;
            renderGrid(liveProducts); // Step 3: Replace Dummy with Live
        }
    }

    function renderGrid(productsToShow) {
        const grid = document.getElementById('productGrid');
        const isAdmin = !document.getElementById('adminSection').classList.contains('hidden');
        grid.innerHTML = '';
        
        productsToShow.forEach(p => {
            grid.innerHTML += `
            <div class="product-card flex flex-col relative">
                ${isAdmin && !p.id.toString().includes('dummy') ? `<button onclick="delP(${p.id})" class="absolute top-4 right-4 bg-red-500 text-white w-8 h-8 rounded-full text-[10px] z-50 shadow-xl">X</button>` : ''}
                <div class="rounded-3xl overflow-hidden mb-6 bg-gray-100">
                    <img src="${p.image_url}" class="w-full h-64 object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=Image+Loading'">
                </div>
                <h3 class="font-bold text-gray-900 text-sm h-12 line-clamp-2 mb-6 px-1 leading-snug">${p.title}</h3>
                <a href="${p.affiliate_link}" target="_blank" class="btn-gradient mt-auto">${p.btn_text}</a>
            </div>`;
        });
    }

    async function handleUpload() {
        const f = document.getElementById('pImageFile').files[0];
        const t = document.getElementById('pTitle').value;
        const l = document.getElementById('pLink').value;
        if(!f || !t || !l) return alert("Fill all fields!");
        
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "Uploading..."; saveBtn.disabled = true;
        
        const name = `img_${Date.now()}_${f.name}`;
        await supabase.storage.from('product-images').upload(name, f);
        const { data: pub } = supabase.storage.from('product-images').getPublicUrl(name);
        await supabase.from('products').insert([{ title: t, btn_text: document.getElementById('pBtn').value || "Buy Now", image_url: pub.publicUrl, affiliate_link: l }]);
        location.reload();
    }

    async function delP(id) { if(confirm("Delete product?")) { await supabase.from('products').delete().eq(id, id); location.reload(); } }
</script>
</body>
</html>
