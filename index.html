<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USA Viral Deals | Trending Picks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        
        /* Fixed Admin Button - Har waqt top par click ke liye tayyar */
        #adminBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            background: #6366f1;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 12px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #adminBtn:hover { transform: scale(1.05); background: #4f46e5; }

        /* Product Card Styling */
        .product-card {
            background: #fff;
            border-radius: 24px;
            padding: 16px;
            transition: all 0.3s ease;
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .buy-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            margin-top: auto;
        }

        .hidden { display: none !important; }
        nav { border-bottom: 1px solid #f0f0f0; padding: 25px 0; }
    </style>
</head>
<body>

<button id="adminBtn" onclick="openAdmin()">ADMIN LOGIN</button>

<nav class="px-8">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
                <span class="text-white font-black text-xl">V</span>
            </div>
            <h1 class="text-2xl font-black tracking-tighter">VIRAL<span class="text-indigo-600">DEALS</span></h1>
        </div>
    </div>
</nav>

        <h2 class="text-2xl font-bold">Store Manager</h2>
        <button onclick="location.reload()" class="text-gray-500 font-bold">Close</button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" id="pTitle" placeholder="Product Name" class="p-4 rounded-2xl border-none shadow-sm">
        <input type="text" id="pLink" placeholder="Affiliate URL" class="p-4 rounded-2xl border-none shadow-sm">
        <input type="file" id="pImage" class="p-4 bg-white rounded-2xl shadow-sm">
    </div>
    <button onclick="uploadProduct()" id="upBtn" class="w-full bg-indigo-600 text-white mt-4 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200">Post Product</button>
</div>

<header class="py-20 text-center px-4">
    <h2 class="text-5xl md:text-7xl font-black text-gray-900 mb-4 tracking-tight">USA <span class="text-indigo-600">VIRAL</span> PICKS</h2>
    <p class="text-gray-500 text-xl max-w-xl mx-auto">The internet's favorite products, hand-picked and tested for quality.</p>
</header>

<main class="max-w-7xl mx-auto px-6 pb-20">
    <div id="storeGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">

</main>

<footer class="bg-gray-50 py-12 text-center border-t border-gray-100">

</footer>

    // Admin Login Fix
    async function openAdmin() {
        const pass = prompt("Enter Admin Key:");
        if(!pass) return;

        const { data } = await supabase.from('admin_settings').select('password').eq('id', 1).single();
        if(data && pass === data.password) {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('adminBtn').classList.add('hidden');
            window.scrollTo({ top: 100, behavior: 'smooth' });
        } else {
            alert("Wrong Password!");
        }
    }

    // Fetch Live Data
    async function fetchLiveProducts() {
        const { data } = await supabase.from('products').select('*').order('created_at', { ascending: false });
        if(data && data.length > 0) {
            renderProducts(data);
        }
    }

    function renderProducts(products) {
        const grid = document.getElementById('storeGrid');
        const isAdmin = !document.getElementById('adminPanel').classList.contains('hidden');
        grid.innerHTML = '';

        products.forEach(p => {
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.image_url}" class="w-full h-64 object-cover rounded-[20px] mb-4" alt="Product">
                    <h3 class="font-extrabold text-gray-800 text-sm mb-4 h-10 line-clamp-2 leading-tight">${p.title}</h3>
                    <a href="${p.affiliate_link}" target="_blank" class="buy-btn">SHOP NOW</a>
                    ${isAdmin && !p.id.toString().includes('dummy') ? `<button onclick="deleteItem(${p.id})" class="mt-2 text-red-500 text-[10px] font-bold uppercase">Remove Product</button>` : ''}
                </div>
            `;
        });
    }
